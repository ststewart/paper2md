notes: |
  Nature article — uses "Extended Data Fig. N" naming for the extended-data
  figure set bundled in the PDF. Main paper has Figs 1-3; Extended Data
  has ED1-5. Total 8 real figures + 1 banner image.

  Per-strategy considerations:
  - The captions extractor needs the FIG_CAPTION_RE_ED_* patterns to
    pick up "Extended Data Fig. N | Title" forms. Without those, the
    classifier sees an incomplete list and matches the wrong things.
  - With ED captions extracted, the remaining failure mode is the
    classifier picking Fig 3 for the page-2 image (which is actually
    Fig 1) — page_1_Figure_0 and page_4_Figure_1 then both claim Fig 3.
    dup-detect with reclassify-excluding should resolve.
