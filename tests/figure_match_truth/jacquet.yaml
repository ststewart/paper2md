notes: |
  17 images: 3 DROPs + 14 real figures. The hardest test case in the
  corpus. 12 numbered figures (1-12) plus 2 appendix figures using the
  letter-prefixed numbering convention some Elsevier journals use
  (Fig. B.13 in Appendix B, Fig. D.14 in Appendix D).

  Baseline failures (pre-fix):
  - 5 images all mapped to Fig 8 (the duplicate group)
  - Fig 9 dropped (caption regex didn't pick up the very long math title)
  - Fig 5 not in captions list at all (plain "Fig. 5. Title" format with
    no bold and no pipe — needed FIG_CAPTION_RE_PLAIN)
  - Fig 10 same issue as Fig 5
  - Figs B.13, D.14 in captions list dependent on FIG_ID_PAT supporting
    the "Letter.Number" form

  After regex extension: all 14 captions extracted. Remaining failure
  modes are then on the classifier path, which dup-detect should
  resolve via reclassify-excluding.
