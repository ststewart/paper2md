notes: |
  Baseline (commit f4ee6b2) emits 7 sidecars but Table I (the first,
  shortest table) is missing entirely -- marker rendered its 1-row
  data as a paragraph "QMC EA Expt EA QMC IP Expt IP Mg unbound..."
  rather than as markdown table syntax (Failure Mode A). With 8
  expected tables, baseline detection rate is 7/8 = 87.5%.

