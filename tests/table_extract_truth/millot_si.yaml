notes: |
  Baseline (commit f4ee6b2 / before table-rescue work) emits 4 valid
  sidecars (S2-S5). S1 fails because bbox+caption-bypass both miss
  (Failure Mode C); S6 fails because marker emits a malformed table
  with 32/45 blank rows (Failure Mode B).

  S5 and S6 are both DFT-MD EOS tables with similar column headers
  on adjacent pages -- when a VLM is shown page 9 alone and asked
  for "Table S6", it tends to extract S5 by mistake. The rescue
  prompt MUST name the caption verbatim and explicitly say "ignore
  any other table that may be visible on this page".
